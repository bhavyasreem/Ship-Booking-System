<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passenger Registration - Nautica Cruises</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Style Sheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">

    <!-- Dynamic Header Nav (Rendered via script.js) -->
    <header id="main-header"></header>

    <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem;">
        <div class="glass-card" style="width: 100%; max-width: 500px; margin: 0;">
            <div class="text-center" style="margin-bottom: 1.5rem;">
                <i class="fas fa-user-plus" style="font-size: 2.5rem; background: var(--gradient-ocean); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem;"></i>
                <h2>Passenger Registration</h2>
                <p style="color: var(--text-secondary); font-size: 0.9rem;">Join Nautica Cruises and start booking your sea travels</p>
            </div>
            
            <form id="register-form">
                <div class="form-group">
                    <label class="form-label" for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" class="form-control" placeholder="john@example.com" required>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label class="form-label" for="reg-phone">Phone Number</label>
                        <input type="tel" id="reg-phone" class="form-control" placeholder="9876543210" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="reg-nationality">Nationality</label>
                        <input type="text" id="reg-nationality" class="form-control" placeholder="Indian" required>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="reg-passport">Passport Number</label>
                    <input type="text" id="reg-passport" class="form-control" placeholder="Z1234567" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="reg-password">Password</label>
                    <input type="password" id="reg-password" class="form-control" placeholder="Create a strong password" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;"><i class="fas fa-check-circle"></i> Create Account</button>
            </form>
            
            <div class="text-center" style="margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-secondary);">
                Already registered? <a href="login.html" style="color: var(--color-accent-blue); font-weight: 600;">Sign In Instead</a>
            </div>
        </div>
    </main>

    <!-- Script Imports -->
    <script src="script.js"></script>
    <script>
        document.getElementById("register-form").addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const payload = {
                full_name: document.getElementById("reg-name").value,
                email: document.getElementById("reg-email").value.trim().toLowerCase(),
                phone: document.getElementById("reg-phone").value,
                nationality: document.getElementById("reg-nationality").value,
                passport_number: document.getElementById("reg-passport").value,
                password: document.getElementById("reg-password").value
            };
            
            try {
                // Verify email is unique before registering (since this matches typical validation flow)
                const existing = await apiCall("/passengers/");
                if (existing.some(p => p.email && p.email.toLowerCase() === payload.email)) {
                    showToast("Email address is already registered. Please login.", "danger");
                    return;
                }
                
                // Add the passenger via API
                const passenger = await apiCall("/passengers/add/", "POST", payload);
                
                // Auto-login registered user
                passenger.role = "passenger";
                setCurrentUser(passenger);
                
                showToast("Registration successful! Welcome on board.", "success");
                
                setTimeout(() => {
                    window.location.href = "passenger_dashboard.html";
                }, 1200);
                
            } catch (error) {
                console.error("Passenger registration failed:", error);
            }
        });
    </script>
</body>
</html>
